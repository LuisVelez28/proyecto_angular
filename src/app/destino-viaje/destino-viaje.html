<div class="card-content">
  <div class="card-img">
    <img [src]="destino?.imagenUrl" alt="{{ destino?.nombre }}" />
    <span><h4>{{ destino?.nombre }}</h4></span>
  </div>
  <div class="card-desc">
    <h3>{{ destino?.nombre }}</h3>
    <p>Destino turístico recomendado para disfrutar de experiencias inolvidables.</p>
    <a href="#" class="btn-card">Leer más</a>
  </div>
</div>
