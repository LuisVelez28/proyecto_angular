<section class="destino-detalle">
	<h2>Mis Destinos</h2>
	<p class="intro">Destinos guardados desde el API</p>

	<div class="acciones">
		<button (click)="recargar()" [disabled]="loading">
			{{ loading ? 'Cargando...' : 'Recargar' }}
		</button>
	</div>

	<div *ngIf="error" class="error">
		❌ {{ error }}
	</div>

	<div *ngIf="loading && !error" class="loading">
		⏳ Cargando destinos...
	</div>

	<div *ngIf="!loading && !error && destinos.length === 0" class="empty">
		📭 No hay destinos guardados todavía
	</div>

	<ul *ngIf="!loading && !error && destinos.length > 0" class="destinos-lista">
		<li *ngFor="let destino of destinos; let i = index">
			<span class="numero">{{ i + 1 }}</span>
			<strong>{{ destino }}</strong>
		</li>
	</ul>

	<div *ngIf="!loading && !error && destinos.length > 0" class="total">
		Total: {{ destinos.length }} destino(s)
	</div>
</section>
